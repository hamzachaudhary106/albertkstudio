# Nginx config for Albert K Studio on a Contabo VPS.
# Place in /etc/nginx/sites-available/albertkstudio.conf and symlink into
# sites-enabled, then run certbot (see DEPLOY-VPS.md) to add the certificate.
#
# Single hostname: albertkstudio.agenbord.co
#   /            -> static Vite build (dist/)
#   /supabase/   -> self-hosted Supabase (Kong gateway on 127.0.0.1:8000)

# ----- HTTP -> HTTPS redirect ---------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name albertkstudio.agenbord.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name albertkstudio.agenbord.co;

    # ssl_certificate / ssl_certificate_key are added by `certbot --nginx`
    ssl_certificate     /etc/letsencrypt/live/albertkstudio.agenbord.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/albertkstudio.agenbord.co/privkey.pem;

    # Stripe webhooks / uploads
    client_max_body_size 10m;

    # --- Supabase API under /supabase/ ------------------------------------
    # The trailing slash on proxy_pass strips the /supabase/ prefix, so
    #   /supabase/rest/v1/...      -> Kong /rest/v1/...
    #   /supabase/functions/v1/... -> Kong /functions/v1/...

    # OPTION B (fallback): route ONLY the two function endpoints to the
    # standalone Node booking server. Keep commented if using Edge Functions.
    # NOTE: this block must come before `location /supabase/` below.
    #
    # location /supabase/functions/v1/ {
    #     proxy_pass         http://127.0.0.1:8787/functions/v1/;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Host $host;
    #     proxy_set_header   X-Real-IP $remote_addr;
    #     proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    # }

    # OPTION A (default): everything under /supabase/ -> Kong (incl. functions).
    location /supabase/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- Frontend (static SPA) --------------------------------------------
    root /var/www/albertkstudio/dist;
    index index.html;

    # Long-cache fingerprinted assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every unknown path serves index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
